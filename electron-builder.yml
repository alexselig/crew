appId: com.alexselig.crew
productName: Crew
copyright: Copyright © 2026 Alex Selig
directories:
  buildResources: build
  output: dist
# electron-vite emits the app into out/; production node_modules (incl. the
# native node-pty) are bundled automatically.
files:
  - out/**/*
  - package.json
# node-pty ships a native .node binary + a helper it spawns, which must live
# outside the asar archive to load/execute.
asarUnpack:
  - "**/node_modules/node-pty/**/*"
mac:
  category: public.app-category.developer-tools
  icon: build/icon.icns
  # electron-builder produces the UNSIGNED (ad-hoc) .app; it is then Developer-ID
  # signed + notarized in a second step by `scripts/sign-notarize.sh` (which also
  # packages the notarized zip + dmg). We don't use electron-builder's built-in
  # notarize because this managed Mac's npm proxy serves an unsigned Electron that
  # Defender deletes during a from-scratch package. See MACOS-SIGNING.md.
  identity: null
  target:
    - dmg
    - zip
dmg:
  title: ${productName}
