appId: com.alexselig.crew
productName: Crew
copyright: Copyright © 2026 Alex Selig
directories:
  buildResources: build
  output: dist
# electron-vite emits the app into out/; production node_modules (incl. the
# native node-pty) are bundled automatically.
files:
  - out/**/*
  - package.json
# node-pty ships a native .node binary + a helper it spawns, which must live
# outside the asar archive to load/execute.
asarUnpack:
  - "**/node_modules/node-pty/**/*"
mac:
  category: public.app-category.developer-tools
  icon: build/icon.icns
  # Unsigned (ad-hoc) build — no Developer ID needed. Downloaded copies are
  # delivered via install.sh (curl sets no quarantine flag), so Gatekeeper's
  # "malware" wall never appears. See MACOS-SIGNING.md.
  identity: null
  # To ship a fully NOTARIZED build (opens with zero warnings on any download),
  # set APPLE_ID / APPLE_APP_SPECIFIC_PASSWORD / APPLE_TEAM_ID, remove the
  # `identity: null` line above, and uncomment the block below (details in
  # MACOS-SIGNING.md):
  # hardenedRuntime: true
  # gatekeeperAssess: false
  # entitlements: build/entitlements.mac.plist
  # entitlementsInherit: build/entitlements.mac.plist
  # notarize: true
  target:
    - dmg
    - zip
dmg:
  title: ${productName}
